services:
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Jakarta
      - DOTNET_SYSTEM_NET_DISABLEIPV6=1
    volumes:
      - ./config:/config
      - ./downloads:/downloads
    ports:
      - "9117:9117"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    networks:
      - jackett-net
  flaresolverr:
    # DockerHub mirror flaresolverr/flaresolverr:latest
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=Europe/London
    networks:
      - jackett-net
    ports:
      - "${PORT:-8191}:8191"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
  orbit:
    build: .
    image: unedotamps/orbit-search:master
    container_name: api
    env_file:
      - .envrc
    ports:
      - "9999:9999"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    networks:
      - jackett-net
networks:
  jackett-net:
    driver: bridge
