{{define "search_results_partial.html"}}
<div x-data="searchPage()" x-init="init()">
    <div class="filter-tabs">
        <button class="tab-btn" :class="{'active': filter === 'all'}" @click="setFilter('all')">All</button>
        <button class="tab-btn" :class="{'active': filter === 'movie'}" @click="setFilter('movie')"><i class="fas fa-film"></i> Movies</button>
        <button class="tab-btn" :class="{'active': filter === 'tv'}" @click="setFilter('tv')"><i class="fas fa-tv"></i> TV Shows</button>
    </div>

    <div id="search-loading" class="loading-orbit htmx-indicator">
        <div class="orbit-loader"><div class="planet"></div><div class="satellite"></div></div>
        <p class="loading-text">Scanning the network...</p>
    </div>

    <div class="orbit-grid results-grid" x-show="!loading" x-transition>
        <template x-for="item in filteredResults" :key="item.id + '-' + item.media_type">
            <a :href="item.media_type === 'movie' ? '/movie/' + item.id : '/tv/' + item.id" class="tmdb-card orbit-card">
                <div class="card-glow"></div>
                <div class="tmdb-card-poster">
                    <img :src="item.poster_path ? 'https://image.tmdb.org/t/p/w342' + item.poster_path : '/static/favicon.svg'" :alt="item.title || item.name" loading="lazy">
                    <span class="media-badge" :class="'badge-' + item.media_type" x-text="item.media_type === 'movie' ? 'Movie' : 'TV'"></span>
                </div>
                <div class="card-content">
                    <h3 class="card-title" x-text="item.title || item.name"></h3>
                    <div class="card-meta-row">
                        <span class="rating"><i class="fas fa-star"></i> <span x-text="(item.vote_average || 0).toFixed(1)"></span></span>
                        <span class="year" x-text="(item.release_date || item.first_air_date || '').substring(0, 4)"></span>
                    </div>
                    <p class="card-overview" x-text="item.overview ? item.overview.substring(0, 120) + '...' : ''"></p>
                </div>
            </a>
        </template>
    </div>

    <div class="empty-state" x-show="!loading && filteredResults.length === 0">
        <i class="fas fa-satellite-dish"></i>
        <p x-show="!errorMsg">No results found</p>
        <p class="orbit-error" x-show="errorMsg" x-text="errorMsg" style="color: var(--orbit-pink)"></p>
    </div>

    <div class="pagination" x-show="totalPages > 1">
        <button class="orbit-btn-secondary" @click="goPage(currentPage - 1)" :disabled="currentPage <= 1"><i class="fas fa-chevron-left"></i> Prev</button>
        <span class="page-info" x-text="'Page ' + currentPage + ' of ' + totalPages"></span>
        <button class="orbit-btn-secondary" @click="goPage(currentPage + 1)" :disabled="currentPage >= totalPages">Next <i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<script>
function searchPage() {
    return {
        query: '{{.Query}}',
        filter: 'all',
        results: [],
        filteredResults: [],
        loading: false,
        errorMsg: '',
        currentPage: 1,
        totalPages: 1,
        async init() { await this.search(1); },
        async search(page) {
            this.loading = true;
            this.errorMsg = '';
            try {
                const resp = await fetch('/api/search?q=' + encodeURIComponent(this.query) + '&page=' + page);
                const data = await resp.json();
                if (!resp.ok) {
                    this.errorMsg = data.error || 'Search failed';
                    this.results = [];
                    this.filteredResults = [];
                    this.loading = false;
                    return;
                }
                this.results = (data.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv');
                this.currentPage = data.page || 1;
                this.totalPages = data.total_pages || 1;
                this.applyFilter();
            } catch (e) {
                console.error('Search failed:', e);
                this.errorMsg = 'Failed to connect to server';
                this.results = [];
                this.filteredResults = [];
            }
            this.loading = false;
        },
        applyFilter() {
            this.filteredResults = this.filter === 'all' ? this.results : this.results.filter(r => r.media_type === this.filter);
        },
        setFilter(f) { this.filter = f; this.applyFilter(); },
        goPage(page) { if (page >= 1 && page <= this.totalPages) this.search(page); }
    }
}
</script>
{{end}}
