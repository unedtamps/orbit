{{define "search.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search: {{.Query}} - OrbitSearch</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/alpinejs@3.14.9/dist/cdn.min.js" defer></script>
</head>
<body>
    <div class="universe-bg"></div>
    <nav class="top-nav">
        <div class="nav-brand">
            <a href="/" class="logo"><i class="fas fa-satellite"></i><span>OrbitSearch</span></a>
        </div>
        <div class="nav-links">
            <a href="/">Search</a>
            <a href="/apidocs/">API</a>
        </div>
    </nav>

    <div id="search-results">
        {{template "search_content.html" .}}
    </div>

    <footer class="orbit-footer">
        <p><i class="fas fa-satellite-dish"></i> OrbitSearch &copy; 2025</p>
    </footer>
</body>
</html>
{{end}}
