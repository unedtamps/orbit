{{define "search.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search: {{.Query}} - OrbitSearch</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/alpinejs@3.14.9/dist/cdn.min.js" defer></script>
</head>
<body x-data="searchOverlay()">
    <div class="search-overlay" :class="{ 'active': loading }">
        <div class="orbit-loader"><div class="planet"></div><div class="satellite"></div></div>
        <p class="overlay-text">Scanning the network...</p>
        <p class="overlay-subtext">Searching across multiple trackers</p>
    </div>

    <div class="universe-bg"></div>
    <nav class="top-nav">
        <div class="nav-brand">
            <a href="/" class="logo"><i class="fas fa-satellite"></i><span>OrbitSearch</span></a>
        </div>
        <div class="nav-links">
            <a href="/">Search</a>
            <a href="/apidocs/">API</a>
        </div>
    </nav>

    <div id="search-results">
        {{template "search_content.html" .}}
    </div>

    <footer class="orbit-footer">
        <p><i class="fas fa-satellite-dish"></i> OrbitSearch &copy; 2026</p>
    </footer>

    <script>
    function searchOverlay() {
        return {
            loading: false,
            init() {
                window.addEventListener('htmx:before-request', () => {
                    this.loading = true;
                });
                window.addEventListener('search-done', () => {
                    this.loading = false;
                });
            }
        }
    }
    function searchPage() {
        return {
            query: '',
            filter: 'all',
            results: [],
            filteredResults: [],
            loading: false,
            errorMsg: '',
            currentPage: 1,
            totalPages: 1,
            async init() {
                this.query = this.$el.dataset.query || '';
                await this.search(1);
            },
            async search(page) {
                this.loading = true;
                this.errorMsg = '';
                try {
                    const resp = await fetch('/api/search?q=' + encodeURIComponent(this.query) + '&page=' + page);
                    const data = await resp.json();
                    if (!resp.ok) {
                        this.errorMsg = data.error || 'Search failed';
                        this.results = [];
                        this.filteredResults = [];
                        this.loading = false;
                        window.dispatchEvent(new Event('search-done'));
                        return;
                    }
                    this.results = (data.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv');
                    this.currentPage = data.page || 1;
                    this.totalPages = data.total_pages || 1;
                    this.applyFilter();
                } catch (e) {
                    console.error('Search failed:', e);
                    this.errorMsg = 'Failed to connect to server';
                    this.results = [];
                    this.filteredResults = [];
                }
                this.loading = false;
                window.dispatchEvent(new Event('search-done'));
            },
            applyFilter() {
                this.filteredResults = this.filter === 'all' ? this.results : this.results.filter(r => r.media_type === this.filter);
            },
            setFilter(f) { this.filter = f; this.applyFilter(); },
            goPage(page) { if (page >= 1 && page <= this.totalPages) this.search(page); }
        }
    }
    </script>
</body>
</html>
{{end}}
