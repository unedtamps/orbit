{{define "index.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrbitSearch - Discover Content</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/alpinejs@3.14.9/dist/cdn.min.js" defer></script>
</head>
<body>
    <div class="universe-bg"></div>

    <nav class="top-nav">
        <div class="nav-brand">
            <a href="/" class="logo"><i class="fas fa-satellite"></i><span>OrbitSearch</span></a>
        </div>
        <div class="nav-links">
            <a href="/" class="active">Search</a>
            <a href="/apidocs/">API</a>
        </div>
    </nav>

    <main class="main-container">
        <div class="hero-section">
            <div class="hero-content">
                <h1 class="glitch-text" data-text="ORBITSEARCH">ORBITSEARCH</h1>
                <p class="tagline">Navigate the digital universe</p>
            </div>
        </div>
        <div class="search-container">
            <form class="orbit-search-form"
                  hx-get="/search"
                  hx-target="#search-results"
                  hx-swap="innerHTML"
                  hx-indicator="#search-loading">
                <div class="orbit-input-wrapper">
                    <div class="orbit-input-ring">
                        <input type="text" name="q" class="orbit-input" placeholder="Search movies, TV shows..." autocomplete="off" required autofocus>
                        <button type="submit" class="orbit-submit"><i class="fas fa-rocket"></i></button>
                    </div>
                </div>
            </form>
        </div>

        <div id="search-loading" class="loading-orbit htmx-indicator">
            <div class="orbit-loader"><div class="planet"></div><div class="satellite"></div></div>
            <p class="loading-text">Scanning the network...</p>
        </div>

        <div id="search-results"></div>

        <div class="api-section">
            <div class="api-card">
                <h3><i class="fas fa-code"></i> Developer API</h3>
                <p>Access our search engine programmatically</p>
                <div class="api-endpoints">
                    <code>GET /api/movies/search/{query}</code>
                    <code>GET /api/tv/search/{query}</code>
                </div>
            </div>
        </div>
    </main>

    <footer class="orbit-footer">
        <p><i class="fas fa-satellite-dish"></i> OrbitSearch &copy; 2025</p>
    </footer>
</body>
</html>
{{end}}
